spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/otter_db
    username: otter_user
    password: otter_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:not-set}
    client-secret: ${GOOGLE_CLIENT_SECRET:not-set}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  kakao:
    client-id: ${KAKAO_CLIENT_ID:not-set}
    client-secret: ${KAKAO_CLIENT_SECRET:not-set}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/auth/kakao/callback}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me