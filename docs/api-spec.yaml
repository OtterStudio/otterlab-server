openapi: 3.0.0
info:
  title: 수달의 밸런스 게임 연구소 API (Updated)
  version: 1.1.0

paths:
  # 1. 게임 플레이 및 투표
  /api/v1/games:
    get:
      summary: "게임 목록 조회 (랜덤/카테고리/최신)"
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [RANDOM, LATEST, POPULAR]
      responses:
        '200':
          description: "질문만 노출되는 카드 리스트 반환"

  /api/v1/games/{gameId}/vote:
    post:
      summary: "투표하기"
      description: "회원 전용. 투표 시 Redis 실시간 통계 반영 및 DB 저장"
      responses:
        '200':
          description: "투표 결과(A/B 비율) 반환"

  # 2. 댓글 및 소통
  /api/v1/games/{gameId}/comments:
    get:
      summary: "댓글 목록 조회"
      description: "작성자의 선택 진영(A/B) 표시 포함"
    post:
      summary: "댓글 작성"
      description: "회원 전용. 욕설 필터링 적용"

  /api/v1/comments/{commentId}/report:
    post:
      summary: "댓글 신고"
      description: "5회 누적 시 해당 유저 3일간 활동 정지"

  # 3. 궁합 테스트
  /api/v1/compatibility-test:
    post:
      summary: "궁합 테스트 생성"
      description: "10문제 선택 및 UUID 고유 링크 생성"
    get:
      summary: "궁합 테스트 상세 및 결과 확인"
      parameters:
        - name: uuid
          in: query
          required: true
          schema:
            type: string
      description: "비회원도 링크를 통해 참여 및 결과 확인 가능"

  # 4. 사용자 분석 및 마이페이지
  /api/v1/users/me/analysis:
    get:
      summary: "성향 분석 리포트"
      description: "대중의 픽 vs 마이너 감성 분석"