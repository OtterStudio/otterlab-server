version: '3.8'

services:
  # Postgres: main database
  otter-db:
    image: postgres:15
    container_name: otter-postgres
    restart: always
    environment:
      POSTGRES_USER: otter_user
      POSTGRES_PASSWORD: otter_password
      POSTGRES_DB: otter_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  # redis: cache database
  otter-redis:
    image: redis:latest
    container_name: otter-redis
    restart: always
    ports:
      - "6379:6379"
